version: '3.8'

services:
  fastmcp-server:
    build: .
    container_name: patient-mcp-server
    ports:
      - "8002:8002"
    environment:
      - PYTHONUNBUFFERED=1
      - HOST=0.0.0.0
      - PORT=8002
      - API_KEY=${API_KEY:-your-secret-api-key-change-this}
    restart: unless-stopped

